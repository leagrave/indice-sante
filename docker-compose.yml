services:
  db:
    image: postgres:15
    container_name: indice-sante-db
    restart: always
    environment:
      POSTGRES_DB: indice_sante
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: