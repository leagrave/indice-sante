spring:
  application:
    name: indice-sante

  datasource:
    url: jdbc:postgresql://localhost:5432/indice_sante
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  properties:
    hibernate:
      format_sql: true

server:
  port: 8080