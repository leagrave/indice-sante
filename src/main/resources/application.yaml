spring:
  application:
    name: indice-sante

  datasource:
    url: jdbc:postgresql://localhost:5432/indice_sante
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  logging:
    level:
      org.hibernate.SQL: OFF
      org.hibernate.type.descriptor.sql: OFF

  jwt:
    secret: ${JWT_SECRET:default-secret-dev}

  server:
    port: 8080